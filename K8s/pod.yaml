apiVersion: v1
kind: Pod
metadata:
  name: mypod4
  labels:
   app:mypod4
spec:
  containers:
    - name: mypod4
      image: adityaithape/b19:myhttpd
      ports:
       - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mypod4-svc
spec:
  type: NodePort
  selector:
     app: mypod4
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
